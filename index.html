<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustentabilidade no Agronegócio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #fdf6e3; /* bege suave */
            color: #333;
        }

        header {
            background-color: #2e7d32; /* verde elegante */
            color: #fdf6e3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #fdf6e3;
            font-weight: bold;
        }

        nav a:hover {
            color: #c5e1a5;
        }

        .banner {
            height: 90vh;
            background-image: url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fdf6e3;
        }

        .banner-texto {
            background-color: rgba(46,125,50,0.7);
            padding: 40px;
            border-radius: 15px;
        }

        .banner h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .banner p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .banner button {
            padding: 12px 25px;
            border: none;
            background-color: #81c784;
            color: #1b5e20;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .banner button:hover {
            background-color: #66bb6a;
            color: #fdf6e3;
        }

        .secao {
            padding: 60px 10%;
        }

        .secao h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 36px;
            color: #2e7d32;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background-color: #fffbea;
            padding: 25px;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 200px; /* altura fixa */
            object-fit: cover; /* mantém proporção */
            border-radius: 10px;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .card img:hover {
            transform: scale(1.05);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #2e7d32;
        }

        .verde {
            background-color: #e8f5e9;
            border-radius: 15px;
            padding: 50px 8%;
        }

        .quiz {
            text-align: center;
        }

        .quiz button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            background-color: #81c784;
            color: #1b5e20;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .quiz button:hover {
            background-color: #66bb6a;
            color: #fdf6e3;
        }

        #resultado {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .contato form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: auto;
        }

        .contato input,
        .contato textarea {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background-color: #fffbea;
        }

        .contato button {
            padding: 12px;
            background-color: #2e7d32;
            color: #fdf6e3;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .frase-final {
            text-align: center;
            margin-top: 30px;
            font-size: 18px;
            font-style: italic;
            color: #4e342e;
        }

        footer {
            background-color: #2e7d32;
            color: #fdf6e3;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }

            nav ul {
                flex-direction: column;
                text-align: center;
            }

            .banner h1 {
                font-size: 35px;
            }

            .cards {
                flex-direction: column;
                align-items: center;
            }

            .card img {
                height: 180px;
            }
        }
    </style>
</head>

</body>
</html>
